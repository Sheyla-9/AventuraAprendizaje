<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #cheerpj-container { width: 100vw; height: 100vh; }
        #loading-message { position: absolute; text-align: center; }
    </style>
</head>
<body>
    <div id="loading-message">
        <h3>Cargando Aventura...</h3>
        <p>Iniciando motor Java. Por favor, espera un momento...</p>
    </div>
    <div id="cheerpj-container"></div>

    <script>
        // Esta función se ejecuta sola en cuanto carga la página
        (async function() {
            // 1. Esperar a que CheerpJ esté en la memoria del navegador
            while (typeof cheerpjInit === 'undefined') {
                await new Promise(item => setTimeout(item, 200));
            }

            // 2. Inicializar motor
            await cheerpjInit();
            
            // 3. Crear pantalla
            cheerpjCreateDisplay(1370, 720); 
            
            // 4. Ejecutar el juego (Usando la ruta absoluta del servidor)
            const urlJar = "https://sheyla-9.github.io/AventuraAprendizaje/JuegoMemorama.jar";
            const urlLib = "https://sheyla-9.github.io/AventuraAprendizaje/lib/AbsoluteLayout.jar";
            
            cheerpjRunJar(urlJar, urlLib).then(() => {
                document.getElementById('loading-message').style.display = 'none';
            });
        })(); 
    </script>
</body>
</html>
