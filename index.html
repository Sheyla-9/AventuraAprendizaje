<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/2.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #status { position: absolute; text-align: center; z-index: 100; background: rgba(0,0,0,0.85); padding: 30px; border-radius: 15px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="status">
        <h3 id="titulo">Iniciando Memorama...</h3>
        <p id="detalle">Cargando componentes de Java...</p>
    </div>
    <div id="game-container"></div>

    <script>
        window.onload = function() {
            // 1. Inicialización
            cheerpjInit();
            cheerpjCreateDisplay(1370, 720);
            
            // 2. Rutas Absolutas (Basadas en tu estructura de GitHub)
            const jarPath = "/app/AventuraAprendizaje/JuegoMemorama.jar";
            const libPath = "/app/AventuraAprendizaje/lib/AbsoluteLayout.jar";
            
            console.log("Ejecutando clase: juegomemorama.INICIO");
            document.getElementById("detalle").innerText = "Abriendo ventana principal...";

            // 3. Ejecución Directa
            // Esta línea coincide exactamente con lo que vimos en tu WinRAR
            cheerpjRunMain("juegomemorama.INICIO", jarPath, libPath);
            
            // Ocultamos el mensaje después de que el motor termine de procesar
            setTimeout(() => {
                document.getElementById("status").style.display = "none";
            }, 8000);
        };
    </script>
</body>
</html>
