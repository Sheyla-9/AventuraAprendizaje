<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #status { position: absolute; text-align: center; z-index: 100; background: rgba(0,0,0,0.85); padding: 30px; border-radius: 15px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="status">
        <h3 id="titulo">Iniciando Memorama...</h3>
        <p id="detalle">Cargando motor de Java oficial...</p>
    </div>
    <div id="game-container"></div>

    <script>
        async function arrancar() {
            try {
                console.log("Paso 1: Verificando motor...");
                
                // Bucle de espera: preguntamos cada 500ms si el motor ya existe
                let intentos = 0;
                while (typeof cheerpjInit === 'undefined') {
                    intentos++;
                    console.log("Esperando librería... (intento " + intentos + ")");
                    document.getElementById("detalle").innerText = "Conectando con el servidor de Java (intento " + intentos + ")...";
                    await new Promise(r => setTimeout(r, 800));
                    
                    if (intentos > 20) { // Si pasa mucho tiempo, forzamos recarga manual
                        document.getElementById("detalle").innerText = "El servidor tarda en responder. Por favor, presiona Ctrl+F5.";
                        return;
                    }
                }

                console.log("¡Motor detectado y listo!");
                document.getElementById("detalle").innerText = "Motor listo. Cargando gráficos del juego...";

                // Paso 2: Inicializar ahora que estamos SEGUROS que existe
                await cheerpjInit();
                cheerpjCreateDisplay(1370, 720);
                
                // Paso 3: Ejecutar JAR con rutas completas
                const jar = "https://sheyla-9.github.io/AventuraAprendizaje/JuegoMemorama.jar";
                const lib = "https://sheyla-9.github.io/AventuraAprendizaje/lib/AbsoluteLayout.jar";
                
                console.log("Llamando al archivo JAR...");
                await cheerpjRunJar(jar, lib);
                
                document.getElementById("status").style.display = "none";
                console.log("¡Aplicación iniciada con éxito!");

            } catch (err) {
                console.error("Error en la secuencia:", err);
                document.getElementById("detalle").innerText = "Error: " + err.message;
            }
        }

        // Arrancamos la secuencia
        arrancar();
    </script>
</body>
</html>
