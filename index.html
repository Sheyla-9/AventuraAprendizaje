<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/2.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #cheerpj-container { width: 100vw; height: 100vh; }
        #loading-message { position: absolute; text-align: center; z-index: 10; }
    </style>
</head>
<body>
    <div id="loading-message">
        <h3>Cargando Aventura...</h3>
        <p>Iniciando motor Java (v2.0)...</p>
    </div>
    <div id="cheerpj-container"></div>

    <script>
        // Función de arranque
        window.onload = function() {
            // 1. Inicializar
            cheerpjInit();
            
            // 2. Crear pantalla
            cheerpjCreateDisplay(1370, 720);
            
            // 3. Ejecutar (Ruta directa al archivo)
            // Asegúrate que el nombre sea exacto: JuegoMemorama.jar
            cheerpjRunJar("/app/JuegoMemorama.jar");
            
            console.log("Comando enviado");
        };
    </script>
</body>
</html>
