<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/2.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        window.onload = function() {
            cheerpjInit();
            cheerpjCreateDisplay(1370, 720);
            
            // Intentamos ejecutar llamando directamente a la clase principal
            // He corregido la ruta del JAR para que sea exacta a tu repositorio
            const jarPath = "/app/AventuraAprendizaje/JuegoMemorama.jar";
            const libPath = "/app/AventuraAprendizaje/lib/AbsoluteLayout.jar";
            
            // PRUEBA 1: Si tu paquete se llama 'juegomemorama' y la clase 'INICIO'
            cheerpjRunMain("juegomemorama.INICIO", jarPath, libPath);
        };
    </script>
</body>
</html>
