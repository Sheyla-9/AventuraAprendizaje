<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/2.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #status { position: absolute; text-align: center; z-index: 100; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="status">
        <h3>Cargando Aventura de Aprendizaje...</h3>
        <p id="msg">Iniciando motor Java...</p>
    </div>
    <div id="game-container"></div>

    <script>
        window.onload = function() {
            // 1. Inicializar motor
            cheerpjInit();
            cheerpjCreateDisplay(1370, 720);
            
            // 2. Detectar la ruta actual automáticamente
            // Esto evita el error 404 al buscar en la raíz
            const path = window.location.pathname;
            const jarPath = "/app" + path + "JuegoMemorama.jar";
            const libPath = "/app" + path + "lib/AbsoluteLayout.jar";
            
            console.log("Intentando cargar desde: " + jarPath);
            document.getElementById("msg").innerText = "Buscando archivos del juego...";

            // 3. Ejecutar con manejo de errores para evitar el fallo de 'then'
            cheerpjRunJar(jarPath, libPath);
            
            // Ocultamos el mensaje tras un tiempo prudente de carga
            setTimeout(() => {
                document.getElementById("status").style.display = "none";
            }, 10000);
        };
    </script>
</body>
</html>
</body>
</html>
