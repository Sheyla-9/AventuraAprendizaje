<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #cheerpj-container { width: 100vw; height: 100vh; position: relative; }
        #loading-message { position: absolute; text-align: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loading-message">
        <h3>Cargando Aventura...</h3>
        <p>Descargando componentes de Java. No cierres esta ventana.</p>
    </div>

    <div id="cheerpj-container"></div>

    <script>
        (async function() {
            try {
                // 1. Esperar a que la librería esté cargada en el navegador
                while (typeof cheerpjInit === 'undefined') {
                    await new Promise(r => setTimeout(r, 200));
                }

                // 2. Inicializar motor
                await cheerpjInit();
                
                // 3. Crear display
                cheerpjCreateDisplay(1370, 720); 
                
                // 4. EJECUCIÓN CON RUTA DIRECTA (Sin /app/)
                // Esto obliga al navegador a buscar el archivo en tu carpeta de GitHub
                console.log("Intentando descargar JuegoMemorama.jar...");
                
                await cheerpjRunJar("./JuegoMemorama.jar", "./lib/AbsoluteLayout.jar");
                
                // Ocultar mensaje al éxito
                document.getElementById('loading-message').style.display = 'none';
                console.log("¡Éxito! El juego debería ser visible ahora.");

            } catch (err) {
                console.error("Error detectado:", err);
            }
        })();
    </script>
</body>
</html>
