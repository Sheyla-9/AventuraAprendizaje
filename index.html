<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #status { position: absolute; text-align: center; z-index: 100; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; border: 2px solid #555; }
    </style>
</head>
<body>
    <div id="status">
        <h3 id="titulo">Iniciando Memorama...</h3>
        <p id="detalle">Conectando con el motor de respaldo...</p>
    </div>
    <div id="game-container"></div>

    <script>
        async function arrancar() {
            try {
                // Si la librería falla, intentamos cargarla de nuevo dinámicamente
                if (typeof cheerpjInit === 'undefined') {
                    console.log("Reintentando carga de motor desde servidor alterno...");
                    const script = document.createElement('script');
                    script.src = "https://cjrtnc.leaningtech.com/loader.js"; 
                    document.head.appendChild(script);
                }

                let intentos = 0;
                while (typeof cheerpjInit === 'undefined') {
                    intentos++;
                    document.getElementById("detalle").innerText = "Sincronizando con Java (intento " + intentos + ")...";
                    await new Promise(r => setTimeout(r, 1000));
                    if (intentos > 15) break;
                }

                await cheerpjInit();
                cheerpjCreateDisplay(1370, 720);
                
                // Forzamos la ruta del JAR para que no use la caché vieja
                const cacheBuster = "?v=" + new Date().getTime();
                const jar = "https://sheyla-9.github.io/AventuraAprendizaje/JuegoMemorama.jar" + cacheBuster;
                const lib = "https://sheyla-9.github.io/AventuraAprendizaje/lib/AbsoluteLayout.jar" + cacheBuster;
                
                await cheerpjRunJar(jar, lib);
                document.getElementById("status").style.display = "none";

            } catch (err) {
                console.error("Error:", err);
                document.getElementById("detalle").innerText = "Error de conexión. Intenta en 1 minuto.";
            }
        }
        arrancar();
    </script>
</body>
</html>
