<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/2.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #status { position: absolute; text-align: center; z-index: 100; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="status">
        <h3>Cargando Memorama...</h3>
        <p>El juego aparecerá en unos segundos.</p>
    </div>
    <div id="game-container"></div>

    <script>
        window.onload = function() {
            // Inicializamos el motor
            cheerpjInit();
            cheerpjCreateDisplay(1370, 720);
            
            // USAMOS RUTAS RELATIVAS (./)
            // Esto le dice: "busca en esta misma carpeta"
            console.log("Iniciando descarga del JAR...");
            
            cheerpjRunJar("./JuegoMemorama.jar", "./lib/AbsoluteLayout.jar").then(() => {
                // Ocultamos el mensaje cuando el JAR responda
                setTimeout(() => {
                    document.getElementById("status").style.display = "none";
                }, 5000);
            });
        };
    </script>
</body>
</html>
