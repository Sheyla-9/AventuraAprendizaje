<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/2.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
        #status { position: absolute; text-align: center; z-index: 100; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="status">
        <h3>Cargando Memorama...</h3>
        <p id="msg">Preparando archivos...</p>
    </div>
    <div id="game-container"></div>

    <script>
        window.onload = function() {
            // Inicialización básica
            cheerpjInit();
            cheerpjCreateDisplay(1370, 720);
            
            // Usamos rutas relativas directas
            // Esto evita que el motor intente agregar el ".js" al final
            const jar = "./JuegoMemorama.jar";
            const lib = "./lib/AbsoluteLayout.jar";

            console.log("Intentando arranque directo...");
            document.getElementById("msg").innerText = "Abriendo ventana principal...";

            // Ejecutamos la clase que vimos en tu WinRAR
            cheerpjRunMain("juegomemorama.INICIO", "/app/AventuraAprendizaje/JuegoMemorama.jar", "/app/AventuraAprendizaje/lib/AbsoluteLayout.jar");

            setTimeout(() => {
                document.getElementById("status").style.display = "none";
            }, 10000);
        };
    </script>
</body>
</html>
