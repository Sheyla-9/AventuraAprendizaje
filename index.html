<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
        #status { position: absolute; text-align: center; }
    </style>
</head>
<body>
    <div id="status">
        <h3>Iniciando Memorama...</h3>
        <p>Si no carga, intenta presionar Ctrl + F5</p>
    </div>
    <div id="game-container"></div>

    <script>
        async function motor() {
            // 1. Esperar a que la librería esté lista
            if (typeof cheerpjInit === 'undefined') {
                setTimeout(motor, 300);
                return;
            }

            console.log("Motor detectado, arrancando...");
            
            // 2. Iniciar motor
            await cheerpjInit();
            cheerpjCreateDisplay(1370, 720);
            
            // 3. Ejecutar JAR (Usando la dirección completa para que no haya duda)
            const jarPath = "https://sheyla-9.github.io/AventuraAprendizaje/JuegoMemorama.jar";
            const libPath = "https://sheyla-9.github.io/AventuraAprendizaje/lib/AbsoluteLayout.jar";
            
            await cheerpjRunJar(jarPath, libPath);
            
            document.getElementById("status").style.display = "none";
        }
        
        // Ejecutar inmediatamente
        motor();
    </script>
</body>
</html>
