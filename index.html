<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #cheerpj-container { width: 100vw; height: 100vh; position: relative; }
        #loading-message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loading-message">
        <h3>Cargando Aventura...</h3>
        <p>Iniciando motor Java. Por favor, espera un momento...</p>
    </div>

    <div id="cheerpj-container"></div>

    <script>
        // Función de arranque inmediato
        (async function() {
            try {
                console.log("Iniciando secuencia de carga...");
                
                // Esperar a que la librería esté lista
                while (typeof cheerpjInit === 'undefined') {
                    await new Promise(r => setTimeout(r, 100));
                }

                // 1. Inicializar motor indicando el contenedor
                await cheerpjInit({
                    display: document.getElementById("cheerpj-container")
                });
                
                // 2. Crear pantalla con tamaño original
                cheerpjCreateDisplay(1370, 720); 
                
                // 3. Ejecutar el JAR principal y su librería
                // Nota: Usamos rutas relativas que son las más estables en GitHub
                await cheerpjRunJar("/app/JuegoMemorama.jar", "/app/lib/AbsoluteLayout.jar");
                
                // 4. Si llegamos aquí, ocultamos el mensaje
                document.getElementById('loading-message').style.display = 'none';
                console.log("¡Carga completa!");

            } catch (err) {
                console.error("Error en el arranque:", err);
            }
        })();
    </script>
</body>
</html>
