<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #status { position: absolute; text-align: center; z-index: 100; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="status">
        <h3 id="titulo">Iniciando Memorama...</h3>
        <p id="detalle">Conectando con el motor de Java...</p>
    </div>
    <div id="game-container"></div>

    <script>
        async function arrancar() {
            try {
                // Paso 1: Forzar la detección de la librería
                if (typeof cheerpjInit === 'undefined') {
                    console.log("Librería no encontrada, cargando manualmente...");
                    await new Promise((resolve) => {
                        const s = document.createElement('script');
                        s.src = "https://cjrtnc.leaningtech.com/3.0/loader.js";
                        s.onload = resolve;
                        document.head.appendChild(s);
                    });
                }

                console.log("¡Motor detectado!");
                document.getElementById("detalle").innerText = "Motor listo. Cargando juego...";

                // Paso 2: Inicializar
                await cheerpjInit();
                cheerpjCreateDisplay(1370, 720);
                
                // Paso 3: Ejecutar JAR
                // Usamos la ruta completa de tu GitHub para que no haya duda
                const jar = "https://sheyla-9.github.io/AventuraAprendizaje/JuegoMemorama.jar";
                const lib = "https://sheyla-9.github.io/AventuraAprendizaje/lib/AbsoluteLayout.jar";
                
                await cheerpjRunJar(jar, lib);
                
                document.getElementById("status").style.display = "none";
                console.log("¡Juego iniciado!");

            } catch (err) {
                console.error("Error crítico:", err);
                document.getElementById("detalle").innerText = "Error al conectar. Reintenta con Ctrl+F5";
            }
        }

        // Arrancamos después de 1 segundo para dejar que el navegador respire
        setTimeout(arrancar, 1000);
    </script>
</body>
</html>
