<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
   <script src="https://cjrtnc.leaningtech.com/3.0/loader.js" defer></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #status { position: absolute; text-align: center; z-index: 100; padding: 20px; background: rgba(0,0,0,0.8); border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="status">
        <h3>Iniciando Memorama...</h3>
        <p id="msg">Cargando motor de Java...</p>
    </div>
    <div id="game-container"></div>

    <script>
        // Función principal autoejecutable
        (async function() {
    try {
        console.log("Esperando a CheerpJ...");
        
        // Si después de 3 segundos no despierta, lo llamamos con fuerza
        const timeout = setTimeout(() => {
            console.log("El motor tarda en despertar, reintentando...");
            const s = document.createElement('script');
            s.src = "https://cjrtnc.leaningtech.com/3.0/loader.js";
            document.head.appendChild(s);
        }, 3000);

        while (typeof cheerpjInit === 'undefined') {
            await new Promise(r => setTimeout(r, 500));
        }
        
        clearTimeout(timeout); // Si despertó, cancelamos el reintento
        console.log("Motor encontrado. Inicializando...");

                // 1. Inicializar
                await cheerpjInit();
                cheerpjCreateDisplay(1370, 720);
                
                // 2. Ejecutar JAR (Rutas completas)
                const jar = "https://sheyla-9.github.io/AventuraAprendizaje/JuegoMemorama.jar";
                const lib = "https://sheyla-9.github.io/AventuraAprendizaje/lib/AbsoluteLayout.jar";
                
                console.log("Llamando al archivo JAR...");
                await cheerpjRunJar(jar, lib);
                
                // 3. Finalizar
                document.getElementById("status").style.display = "none";
                console.log("¡Proceso completado!");

            } catch (err) {
                console.error("Error en el arranque:", err);
                document.getElementById("msg").innerText = "Error al iniciar. Revisa la consola (F12).";
            }
        })();
    </script>
</body>
</html>
