<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #status { position: absolute; text-align: center; z-index: 100; padding: 20px; background: rgba(0,0,0,0.7); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="status">
        <h3 id="msg-titulo">Iniciando Memorama...</h3>
        <p id="msg-detalle">Cargando motor de Java oficial...</p>
    </div>
    <div id="game-container"></div>

    <script>
        // Función de arranque con reintento automático
        async function arrancarMotor() {
            try {
                console.log("Paso 1: Iniciando carga...");
                
                // Si la librería falló por certificado, esto la reintenta una vez
                if (typeof cheerpjInit === 'undefined') {
                    console.log("Reintentando conexión...");
                    await new Promise(r => setTimeout(r, 1000));
                    if (typeof cheerpjInit === 'undefined') {
                        document.getElementById("msg-detalle").innerText = "El motor está tardando en responder. Espera un momento...";
                        return;
                    }
                }

                // Inicializar
                await cheerpjInit();
                console.log("Paso 2: Motor listo.");
                cheerpjCreateDisplay(1370, 720);
                
                const jar = "https://sheyla-9.github.io/AventuraAprendizaje/JuegoMemorama.jar";
                const lib = "https://sheyla-9.github.io/AventuraAprendizaje/lib/AbsoluteLayout.jar";
                
                await cheerpjRunJar(jar, lib);
                
                document.getElementById("status").style.display = "none";
                console.log("Paso 3: ¡Juego en pantalla!");

            } catch (err) {
                console.error("Error en motor:", err);
            }
        }

        // Ejecutar al cargar la ventana
        window.onload = arrancarMotor;
    </script>
</body>
</html>
