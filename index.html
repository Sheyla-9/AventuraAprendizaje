<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aventura de Aprendizaje</title>
    
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #cheerpj-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100% !important; max-height: 100% !important; object-fit: contain; }
        #loading-message { position: absolute; text-align: center; z-index: 10; }
    </style>
</head>
<body>

    <div id="loading-message">
        <h3>Cargando Aventura...</h3>
        <p>Conectando con el motor Java (CheerpJ)...</p>
    </div>

    <div id="cheerpj-container"></div>

    <script>
    async function iniciarJuego() {
        if (typeof cheerpjInit === 'undefined') {
            setTimeout(iniciarJuego, 500);
            return;
        }

        try {
            await cheerpjInit({
                display: document.getElementById("cheerpj-container")
            });
            
            cheerpjCreateDisplay(1370, 720); 
            
            // Usamos rutas relativas simples
            // Esto buscará el JAR y la carpeta lib en el mismo lugar que el index.html
            await cheerpjRunJar("./JuegoMemorama.jar", "./lib/AbsoluteLayout.jar");
            
            document.getElementById('loading-message').style.display = 'none';
        } catch (error) {
            console.error("Error:", error);
        }
    }
    window.onload = iniciarJuego;
</script>
</body>
</html>
