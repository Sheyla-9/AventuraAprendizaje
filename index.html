<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/2.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #status { text-align: center; background: rgba(0,0,0,0.8); padding: 25px; border-radius: 15px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="status">
        <h3 id="titulo">Aventura de Aprendizaje</h3>
        <p id="msg">Cargando juego.jar...</p>
    </div>
    <div id="game-container"></div>

    <script>
        window.onload = function() {
            // Inicializar motor
            cheerpjInit();
            cheerpjCreateDisplay(1370, 720);
            
            // RUTAS ACTUALIZADAS
            const jar = "/app/AventuraAprendizaje/juego.jar";
            const lib = "/app/AventuraAprendizaje/lib/AbsoluteLayout.jar";

            console.log("Iniciando desde el nuevo archivo: juego.jar");
            
            // Ejecutamos la clase que vimos en tu WinRAR
            cheerpjRunMain("juegomemorama.INICIO", jar, lib);

            // Ocultar mensaje cuando el logo de CheerpJ termine
            setTimeout(() => {
                document.getElementById("status").style.display = "none";
            }, 12000);
        };
    </script>
</body>
</html>
