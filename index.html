<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aventura de Aprendizaje</title>
    <script src="https://cjrtnc.leaningtech.com/2.0/loader.js"></script>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
        #status { position: absolute; text-align: center; z-index: 100; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; border: 2px solid #ff4444; }
    </style>
</head>
<body>
    <div id="status">
        <h3 id="titulo">Iniciando Memorama...</h3>
        <p id="detalle">Conectando con el servidor de respaldo (v2)...</p>
    </div>
    <div id="game-container"></div>

    <script>
        window.onload = function() {
            console.log("Página cargada. Verificando motor...");
            
            // Si la v2.0 carga, iniciamos de inmediato
            if (typeof cheerpjInit !== 'undefined') {
                iniciarJuego();
            } else {
                // Si falla, intentamos cargar la v3.0 dinámicamente como último recurso
                console.log("v2 falló, intentando v3...");
                var s = document.createElement('script');
                s.src = "https://cjrtnc.leaningtech.com/3.0/loader.js";
                s.onload = iniciarJuego;
                document.head.appendChild(s);
            }
        };

        function iniciarJuego() {
            document.getElementById("detalle").innerText = "Motor encontrado. Cargando JAR...";
            cheerpjInit();
            cheerpjCreateDisplay(1370, 720);
            
            // Usamos rutas relativas para evitar problemas de dominio
            cheerpjRunJar("/app/JuegoMemorama.jar", "/app/lib/AbsoluteLayout.jar");
            
            setTimeout(function() {
                document.getElementById("status").style.display = "none";
            }, 8000);
        }
    </script>
</body>
</html>
